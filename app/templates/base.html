<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Flask Task Manager{% endblock %}</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/styles.css') }}"
    />
  </head>

  <body
    class="min-h-screen bg-gradient-to-br from-indigo-500 to-purple-700 flex justify-center items-start py-10 px-5"
  >
    {% block body %}{% endblock %}
  </body>
</html>
