{% extends "base.html" %} {% block title %}Registro{% endblock %} {% block body
%}
<div class="bg-white rounded-2xl shadow-2xl p-10 w-full max-w-xl">
  <h1 class="text-center text-indigo-500 mb-2 text-3xl font-bold">Registro</h1>
  {% if error %}
  <div
    class="bg-red-50 text-red-500 px-4 py-3 rounded-lg border-l-4 border-red-500 mb-5 font-medium"
  >
    {{ error }}
  </div>
  {% endif %}
  <form method="POST" class="flex flex-col gap-4">
    <label for="name" class="font-semibold text-gray-600 text-sm">Nombre</label>
    <input
      type="text"
      name="name"
      id="name"
      required
      class="px-4 py-3 border-2 border-gray-200 rounded-lg text-base outline-none focus:border-indigo-500 focus:shadow-[0_0_0_3px_rgba(102,126,234,0.1)] transition-all duration-300"
    />
    <label for="email" class="font-semibold text-gray-600 text-sm"
      >Correo</label
    >
    <input
      type="email"
      name="email"
      id="email"
      required
      class="px-4 py-3 border-2 border-gray-200 rounded-lg text-base outline-none focus:border-indigo-500 focus:shadow-[0_0_0_3px_rgba(102,126,234,0.1)] transition-all duration-300"
    />
    <label for="password" class="font-semibold text-gray-600 text-sm"
      >Contrasena</label
    >
    <input
      type="password"
      name="password"
      id="password"
      required
      class="px-4 py-3 border-2 border-gray-200 rounded-lg text-base outline-none focus:border-indigo-500 focus:shadow-[0_0_0_3px_rgba(102,126,234,0.1)] transition-all duration-300"
    />
    <input
      type="submit"
      value="Registrarse"
      class="px-4 py-3 border-none rounded-lg text-lg font-semibold cursor-pointer bg-gradient-to-r from-indigo-500 to-purple-600 text-white hover:-translate-y-0.5 hover:shadow-lg hover:shadow-indigo-500/40 transition-all duration-300 mt-2"
    />
  </form>
  <div class="text-center mt-5 pt-5 border-t-2 border-gray-100">
    Ya tienes cuenta?
    <a
      href="{{ url_for('users.login') }}"
      class="text-indigo-500 font-semibold hover:text-purple-600 hover:underline"
      >Inicia sesion</a
    >
  </div>
</div>
{% endblock %}
