<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flask App</title>
  </head>
  <script>
    function checkConfirmation(noteId) {
      if (confirm("Borrar esta nota")) {
        document.getElementById("notes-" + noteId).submit();
      }
    }
  </script>
  <body>
    <h1>Welcome to the Flask App</h1>
    <p>This is a simple Flask application.</p>
    <ul>
      {% for note in notes %}
      <li>
        <strong>{{ note.title }}</strong><br />
        {{ note.content }}
        <a href="{{ url_for('notes.edit_note', note_id=note.id) }}">Edit</a>
        <form
          id="notes-{{ note.id }}"
          method="POST"
          action="{{ url_for('notes.delete_note', note_id=note.id) }}"
          style="display: inline"
        >
          <input
            type="submit"
            value="Delete"
            onclick="event.preventDefault(); checkConfirmation('{{ note.id }}');"
          />
        </form>
      </li>
      {% else %}
      <li>No notes available.</li>
      {% endfor %}
    </ul>
    Create a new note:
    <a href="{{ url_for('notes.create_note') }}">Create Note</a>
  </body>
</html>
